name: Build Kernel WP15

# Запуск сборки вручную по кнопке
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout current repository (for defconfig)
        uses: actions/checkout@v3

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Download Toolchain (Proton-Clang)
        run: |
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain

      - name: Clone Donor Kernel Source
        run: |
          git clone --depth=1 https://github.com/whjddzyx/android_kernel_oppo_mtk6853.git kernel_source

      - name: Inject KernelSU
        run: |
          cd kernel_source/4.14.186
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Setup Config and NetHunter Flags
        run: |
          # Копируем твой конфиг в нужную папку исходников
          cp wp15_defconfig kernel_source/4.14.186/arch/arm64/configs/wp15_defconfig
          
          # Автоматически добавляем нужные флаги в конец файла
          cd kernel_source/4.14.186
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_KPROBES_ON_FTRACE=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_MAC80211=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_CFG80211=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_USB_G_HID=y" >> arch/arm64/configs/wp15_defconfig
          echo "CONFIG_BINFMT_MISC=y" >> arch/arm64/configs/wp15_defconfig

      - name: Compile Kernel
        run: |
          export PATH="$GITHUB_WORKSPACE/toolchain/bin:$PATH"
          cd kernel_source/4.14.186
          
          # Генерируем .config из твоего wp15_defconfig
          make O=out ARCH=arm64 wp15_defconfig
          
          # Запускаем сборку на все ядра сервера
          make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Upload Kernel Artifact
        uses: actions/upload-artifact@v3
        with:
          name: WP15-Kernel-Build
          path: |
            kernel_source/4.14.186/out/arch/arm64/boot/Image.gz
            kernel_source/4.14.186/out/arch/arm64/boot/Image.gz-dtb
