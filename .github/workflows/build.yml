name: Build WP15 Kernel (Force Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libssl-dev libxml2 libxml2-utils lzop rsync schedtool squashfs-tools zip binutils-aarch64-linux-gnu

      - name: Clone Toolchain
        run: git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain

      - name: Clone Kernel Source
        run: git clone --depth=1 https://github.com/whjddzyx/android_kernel_oppo_mtk6853.git kernel

      - name: Force Fix Assembler (EL Error Fix)
        run: |
          # Этот шаг заменяет кривой ассемблер в тулчейне на нормальный системный
          # Находим все исполняемые файлы 'as' в папке тулчейна и подменяем их
          REAL_AS=$(which aarch64-linux-gnu-as)
          find $GITHUB_WORKSPACE/toolchain -name "aarch64-linux-gnu-as" -exec ln -sf $REAL_AS {} \;
          find $GITHUB_WORKSPACE/toolchain -name "as" -exec ln -sf $REAL_AS {} \;
          echo "Assembler replaced with system version: $REAL_AS"

      - name: Integrate KernelSU
        run: |
          cd kernel/4.14.186
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: Prepare Defconfig
        run: |
          cp wp15_defconfig kernel/4.14.186/arch/arm64/configs/wp15_defconfig
          cd kernel/4.14.186
          sed -i 's/CONFIG_CUSTOM_KERNEL_IMGSENSOR/ # CONFIG_CUSTOM_KERNEL_IMGSENSOR/g' arch/arm64/configs/wp15_defconfig
          sed -i 's/CONFIG_MICROTRUST_TEE=y/CONFIG_MICROTRUST_TEE=n/g' arch/arm64/configs/wp15_defconfig
          sed -i 's/CONFIG_TRUSTY=y/CONFIG_TRUSTY=n/g' arch/arm64/configs/wp15_defconfig
          {
            echo "CONFIG_KPROBES=y"
            echo "CONFIG_KALLSYMS=y"
            echo "CONFIG_KALLSYMS_ALL=y"
            echo "CONFIG_USB_G_HID=y"
            echo "CONFIG_MALI_PLATFORM_THIRDPARTY_NAME=\"mt6853\""
            echo "CONFIG_SECTION_MISMATCH_WARN_ONLY=y"
          } >> arch/arm64/configs/wp15_defconfig

            - name: Build Kernel
        run: |
          # 1. Прописываем путь к тулчейну
          export PATH=$GITHUB_WORKSPACE/toolchain/bin:$PATH
          
          # 2. Устанавливаем системный ассемблер (он понимает -EL)
          sudo apt-get update && sudo apt-get install -y binutils-aarch64-linux-gnu
          
          cd kernel/4.14.186
          make O=out ARCH=arm64 wp15_defconfig
          
          # 3. Сборка. Ключевой момент: перенаправляем AS на системный
          make -j$(nproc --all) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            LLVM=1 \
            LLVM_IAS=0 \
            AS=aarch64-linux-gnu-as \
            LD=ld.lld


      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git
          if [ -f kernel/4.14.186/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel/4.14.186/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          else
            cp kernel/4.14.186/out/arch/arm64/boot/Image AnyKernel3/
          fi
          cd AnyKernel3 && zip -r9 ../kernel-wp15-build.zip *

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: WP15-Kernel
          path: kernel-wp15-build.zip
